<div class="auth-container">
      <div class="auth-card">
        <h2>Welcome Back</h2>
        <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
          <input type="email" name="email" [(ngModel)]="email" placeholder="Email Address" required />
          <input type="password" name="password" [(ngModel)]="password" placeholder="Password" required />
          <button type="submit" [disabled]="!loginForm.valid">Sign In</button>
        </form>
        <p>New here? <a routerLink="/signup">Create account</a></p>
      </div>
    </div>
